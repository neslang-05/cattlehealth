<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cattle Health Monitoring System</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Firebase (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="header-title">
        <span class="sub-label">Cattle Health Monitor</span>
        <h1>Sensor Data Overview</h1>
      </div>
      <div class="live-badge">
        <span class="badge-dot"></span>
        Live
      </div>
    </div>
  </header>

  <main>
    <div class="grid">
      <!-- Pulse Rate Card -->
      <div class="card pulse-card">
        <span class="card-label">Pulse Rate</span>
        <p><span id="pulse">--</span><span class="unit">BPM</span></p>
        <div id="pulse-badge" class="status-badge status-neutral">Sensor active</div>
      </div>

      <!-- Internal Temp Card -->
      <div class="card internal-card">
        <span class="card-label">External Temp</span>
        <p><span id="internalTemp">--</span><span class="unit">°C</span></p>
        <div id="internal-badge" class="status-badge status-neutral">Sensor active</div>
      </div>

      <!-- External Temp Card -->
      <div class="card external-card">
        <span class="card-label">Internal Temp</span>
        <p><span id="externalTemp">--</span><span class="unit">°C</span></p>
        <div id="external-badge" class="status-badge status-neutral">Sensor active</div>
      </div>

      <!-- Distance Card -->
      <div class="card distance-card">
        <span class="card-label">Distance</span>
        <p><span id="distance">--</span><span class="unit">cm</span></p>
        <div id="distance-badge" class="status-badge status-neutral">Sensor active</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bar">
      <div class="footer-left">
        <span class="pulsing-dot"></span>
        Last updated: <span id="timestamp-val">DM MONO TIME</span>
      </div>
      <div class="footer-right">
        cow_1 · Firebase RTDB
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
