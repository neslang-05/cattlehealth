<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cattle Health Monitoring Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<header>

<h1>CATTLE HEALTH MONITORING SYSTEM</h1>

</header>

<main>

<section class="grid">

<div class="card">

<h2>Pulse Rate</h2>

<p id="pulse">--</p>

<span>BPM</span>

</div>


<div class="card">

<h2>Internal Temperature</h2>

<p id="internalTemp">--</p>

<span>°C</span>

</div>


<div class="card">

<h2>External Temperature</h2>

<p id="externalTemp">--</p>

<span>°C</span>

</div>


<div class="card">

<h2>Distance</h2>

<p id="distance">--</p>

<span>cm</span>

</div>


<div class="card large">

<h2>Last Update</h2>

<p id="timestamp">Waiting for data...</p>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
